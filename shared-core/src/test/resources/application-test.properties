# ── Test configuration for shared-core unit tests ──
# Unit tests (@Tag("unit")) do NOT load Spring context.
# This file is used by integration tests (@Tag("integration"))
# that DO start a Spring Boot context with Testcontainers.

spring.application.name=shared-core-test

# ── JPA (overridden by Testcontainers in integration tests) ──
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# ── Flyway (runs migrations before integration tests) ──
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ── Redis (overridden by Testcontainers) ──
spring.data.redis.timeout=2000ms

# ── Kafka (overridden by Testcontainers) ──
spring.kafka.consumer.auto-offset-reset=earliest

# ── Arokkiyam shared-core settings ──
arokkiyam.encryption.master-key=${ENCRYPTION_MASTER_KEY:dGVzdC1rZXktMzItYnl0ZXMtZm9yLXRlc3Rpbmctb25seQ==}
arokkiyam.cache.default-ttl-seconds=3600
arokkiyam.cache.health-check-interval-seconds=30
arokkiyam.idempotency.ttl-hours=24
arokkiyam.tenant.header-name=X-Tenant-ID
arokkiyam.kafka.audit-topic=audit.event
arokkiyam.kafka.notification-topic=notification.send
arokkiyam.kafka.audit-dlq-topic=audit.event.dlq
arokkiyam.kafka.notification-dlq-topic=notification.send.dlq

# ── Logging — quieter in tests ──
logging.level.com.arokkiyam=DEBUG
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.org.testcontainers=INFO