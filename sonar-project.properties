# ─────────────────────────────────────────────────────────────
# SonarQube project configuration for Arokkiyam
# Used by both local SonarQube and CI pipeline.
# sonar.login / sonar.token — set via environment variable
# or GitHub Actions secret. Never commit credentials here.
# ─────────────────────────────────────────────────────────────

sonar.projectKey=arokkiyam
sonar.projectName=Arokkiyam Healthcare Platform
sonar.projectVersion=1.0.0-SNAPSHOT

# Source and test directories (Maven multi-module)
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.source=21
sonar.java.target=21

# JaCoCo XML report paths (merged unit + integration)
sonar.coverage.jacoco.xmlReportPaths=\
  shared-core/target/site/jacoco/jacoco.xml,\
  iam-service/target/site/jacoco/jacoco.xml,\
  audit-service/target/site/jacoco/jacoco.xml,\
  notification-service/target/site/jacoco/jacoco.xml

# Encoding
sonar.sourceEncoding=UTF-8

# ── Quality Gate: all must pass for green status ──
# These are configured in SonarQube UI, not here.
# Reference gate name: "Arokkiyam Gate"
#   - Line coverage >= 80%
#   - Blocker issues = 0
#   - Critical security hotspots (unreviewed) = 0
#   - Duplicated lines < 3%
#   - New critical issues = 0

# ── Exclusions from analysis ──
# DTOs, entities, configs: no logic to analyse
sonar.exclusions=\
  **/dto/**,\
  **/model/**,\
  **/*Application.java,\
  **/config/**,\
  **/exception/**,\
  **/entity/**,\
  **/migration/**,\
  **/*.sql

# ── Coverage exclusions (same list as JaCoCo) ──
sonar.coverage.exclusions=\
  **/dto/**,\
  **/model/**,\
  **/*Application.java,\
  **/config/**,\
  **/exception/**,\
  **/entity/**

# ── CPD (copy-paste detection) exclusions ──
sonar.cpd.exclusions=\
  **/dto/**,\
  **/entity/**

# ── Modules ──
sonar.modules=shared-core,iam-service,audit-service,notification-service

shared-core.sonar.projectName=Shared Core Library
shared-core.sonar.sources=src/main/java
shared-core.sonar.tests=src/test/java

iam-service.sonar.projectName=IAM Service
iam-service.sonar.sources=src/main/java
iam-service.sonar.tests=src/test/java

audit-service.sonar.projectName=Audit Service
audit-service.sonar.sources=src/main/java
audit-service.sonar.tests=src/test/java

notification-service.sonar.projectName=Notification Service
notification-service.sonar.sources=src/main/java
notification-service.sonar.tests=src/test/java
